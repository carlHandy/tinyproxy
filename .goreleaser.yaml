version: 2

project_name: tinyproxy

builds:
  - main: ./cmd/tinyproxy/
    binary: tinyproxy
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

# This creates the .deb and .rpm packages for Linux
nfpms:
  - vendor: "Carl Handy"
    homepage: "https://github.com/carlHandy/tinyproxy"
    maintainer: "Carl Handy"
    description: "A secure and performant reverse proxy and web server"
    license: "MIT" # Change if using a different license
    formats:
      - deb
      - rpm
    scripts:
      postinstall: packaging/postinstall.sh
      preremove: packaging/preremove.sh
    contents:
      - src: config/vhosts.conf
        dst: /etc/tinyproxy/vhosts.conf
        type: config|noreplace
      - src: packaging/tinyproxy.service
        dst: /lib/systemd/system/tinyproxy.service
      - src: static/
        dst: /usr/share/tinyproxy/static/

# This packages Windows and macOS binaries into zip/tar files
archives:
  - formats: 
      - tar.gz
    # Use zip for Windows
    format_overrides:
      - goos: windows
        formats: 
          - zip