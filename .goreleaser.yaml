version: 2

project_name: go-tinyproxy

builds:
  - main: ./cmd/tinyproxy/
    binary: go-tinyproxy
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

# This creates the .deb and .rpm packages for Linux
nfpms:
  - vendor: "Carl Handy"
    homepage: "https://github.com/carlHandy/go-tinyproxy"
    maintainer: "Carl Handy"
    description: "A secure and performant reverse proxy and web server"
    license: "BSD-3-Clause license"
    formats:
      - deb
      - rpm
    bindir: /usr/local/bin
    scripts:
      postinstall: packaging/postinstall.sh
      preremove: packaging/preremove.sh
    contents:
      - src: config/vhosts.conf
        dst: /etc/go-tinyproxy/vhosts.conf
        type: config
      - src: config/fingerprints.conf
        dst: /etc/go-tinyproxy/fingerprints.conf
        type: config
      - src: packaging/go-tinyproxy.service
        dst: /etc/systemd/system/go-tinyproxy.service
      - src: static/
        dst: /usr/share/go-tinyproxy/static/
      - src: LICENSE
        dst: /etc/go-tinyproxy/LICENSE

# This packages Windows and macOS binaries into zip/tar files
archives:
  - formats: 
      - tar.gz
    # Use zip for Windows
    format_overrides:
      - goos: windows
        formats:
          - zip

dockers:
  - image_templates:
      - "kalpadev/tinyproxy:{{ .Version }}-amd64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
    goarch: amd64
    goos: linux
    extra_files:
      - docker/vhosts.default.conf
      - config/fingerprints.conf
      - static/

  - image_templates:
      - "kalpadev/tinyproxy:{{ .Version }}-arm64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
    goarch: arm64
    goos: linux
    extra_files:
      - docker/vhosts.default.conf
      - config/fingerprints.conf
      - static/

docker_manifests:
  - name_template: "kalpadev/tinyproxy:{{ .Version }}"
    image_templates:
      - "kalpadev/tinyproxy:{{ .Version }}-amd64"
      - "kalpadev/tinyproxy:{{ .Version }}-arm64"

  - name_template: "kalpadev/tinyproxy:latest"
    image_templates:
      - "kalpadev/tinyproxy:{{ .Version }}-amd64"
      - "kalpadev/tinyproxy:{{ .Version }}-arm64"

sboms:
  - artifacts: binary

docker_signs:
  - cmd: cosign
    args:
      - sign
      - "--yes"
      - "${artifact}@${digest}"
    artifacts: all