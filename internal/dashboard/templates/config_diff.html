{{if .Error}}
    <div class="w-full">
        <div class="flex items-center gap-3 bg-red-900/20 border border-red-500/30 rounded-lg p-4 mb-6">
            <svg class="w-5 h-5 text-red-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <div class="flex flex-col">
                <span class="text-xs font-bold text-red-400 uppercase tracking-wider mb-0.5">Validation Failed</span>
                <span class="text-sm text-red-200/80">{{.Error}}</span>
            </div>
        </div>
        <button type="submit" class="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg text-sm font-bold shadow-lg transition-all transform hover:-translate-y-0.5">Try Validating Again</button>
    </div>
{{else}}
    <div class="w-full">
        <input type="hidden" name="rawConfig" value="{{.RawConfig}}">
        <div class="flex items-center gap-3 bg-green-900/20 border border-green-500/30 rounded-lg p-4 mb-6">
            <svg class="w-5 h-5 text-green-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <div class="flex flex-col">
                <span class="text-xs font-bold text-green-400 uppercase tracking-wider mb-0.5">Changes Validated</span>
                <span class="text-sm text-green-200/80">The configuration is valid and can be applied safely.</span>
            </div>
        </div>
        <div class="flex gap-4">
            <button hx-post="/config/save" hx-target="#config-content" class="px-8 py-3 bg-green-600 hover:bg-green-500 text-white rounded-lg text-sm font-bold shadow-lg transition-all transform hover:-translate-y-0.5">Commit & Restart Server</button>
            <button hx-get="/config?tab=raw" hx-target="#config-content" class="px-6 py-3 bg-gray-800 hover:bg-gray-700 text-gray-300 rounded-lg text-sm font-bold transition-all">Discard Changes</button>
        </div>
    </div>
{{end}}
