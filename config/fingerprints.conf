# Global TLS Fingerprint Blocklist
#
# Incoming connections are fingerprinted before the HTTP handler runs.
# If a connection matches an entry here, it receives a 403 Forbidden or
# a honeypot response (if configured for the virtual host).
#
# Format:
# prefix:hash
#
# Supported prefixes:
# ja3:   Salesforce JA3 MD5 hash (32 hex characters)
# ja4:   FoxIO JA4 string format

# Known scanner fingerprints
ja3:25e6eab53744234c00ef5889ab8a8cd4     # Example scanner
ja4:t13d3112h2_8daaf6152771_bbaee72be2cb # Example scanner

# Uncomment to block specific toolings (use actual hashes in practice)
# ja3:abc123def456...     # curl default
# ja3:fed321cba987...     # Masscan
# ja4:t13d1516h2_abc123   # Mirai variant
